# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5
exec-once = systemctl --user start orateur.service
exec-once = [workspace 1 silent] zen-browser
# Example: editor in a workspace — set your path locally or uncomment:
# exec-once = [workspace 2 silent] cursor ~/path/to/your/project
exec-once = [workspace 11 silent] slack
exec-once = [workspace 11 silent] spotify
exec-once = mount-tutor && mount-media
exec-once = orateur-desktop
