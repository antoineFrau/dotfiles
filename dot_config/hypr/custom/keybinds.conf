# bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "cursor" "zed" "zedit" "zeditor" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro" # Code editor
# bind = Ctrl+Super+Shift+Alt, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "wps" "onlyoffice-desktopeditors" "libreoffice" # Office software
# bind = Super, X, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kate" "gnome-text-editor" "emacs" # Text editor
# bind = Ctrl+Super, V, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "pavucontrol-qt" "pavucontrol" # Volume mixer
# bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/hyprland/scripts/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" "gnome-control-center" "better-control" # Settings app
# bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop" # Task manager
bind = Super, F9, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh start # Toggle voice transcription
bind = Super, F10, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh stop # Show voice transcription status

##! Workspace
# Switching
#/# bind = Super + Control, Hash,, # Focus workspace # (1, 2, 3,...)
bind = Super+Control, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6 # [hidden]
bind = Super+Control, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7 # [hidden]
bind = Super+Control, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8 # [hidden]
bind = Super+Control, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9 # [hidden]
bind = Super+Control, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10 # [hidden]

# Speech-to-speech voice agent (set HA_MCP_TOKEN in env or use placeholder)
# bind = Shift+Alt, Space, exec, HA_MCP_TOKEN=<token> ~/.config/hypr/hyprland/scripts/launch_first_available.sh "foot -e bash -c 'cd ~/Documents/speech-to-speech && ./start_s2s.sh; exec bash'" "kitty -1 -d ~/Documents/speech-to-speech -e bash -c './start_s2s.sh; exec bash'" # Start speech-to-speech session

